<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Just One Question ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Trebuchet MS',sans-serif;

    background: linear-gradient(
        135deg,
        #ffd6e7,
        #f6d8ff,
        #d8e9ff
    );
}

/* Floating flowers */

.flower{
    position:absolute;
    font-size:24px;
    animation: float 12s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(110vh);
    }
    to{
        transform:translateY(-120px);
    }
}

/* Main card */

.card{
    position:relative;
    z-index:10;

    background:rgba(255,255,255,0.25);

    backdrop-filter:blur(12px);

    padding:40px;
    border-radius:30px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.15);

    width:90%;
    max-width:450px;
}

h1{
    color:#6a3f6f;
    margin-bottom:25px;
}

p{
    color:#775d7c;
    margin-bottom:30px;
}

.buttons{
    position:relative;
    height:220px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:999px;
    transition:0.25s;
}

/* YES */

#yesBtn{
    background:#ff6fa5;
    color:white;

    font-size:22px;

    padding:16px 38px;

    box-shadow:0 6px 18px rgba(255,111,165,.4);
}

/* NO */

#noBtn{
    position:absolute;

    background:white;
    color:#666;

    font-size:22px;

    padding:16px 38px;

    left:58%;
    top:55%;

    box-shadow:0 6px 18px rgba(0,0,0,.1);
}

#result{
    display:none;
    font-size:28px;
    color:#ff4d94;
    margin-top:20px;
}

</style>
</head>

<body>

<!-- floating flowers -->
<div class="flower" style="left:10%;animation-delay:0s">🌸</div>
<div class="flower" style="left:25%;animation-delay:2s">🌷</div>
<div class="flower" style="left:40%;animation-delay:5s">🌸</div>
<div class="flower" style="left:55%;animation-delay:1s">🌼</div>
<div class="flower" style="left:70%;animation-delay:4s">🌸</div>
<div class="flower" style="left:85%;animation-delay:7s">🌷</div>

<div class="card">

    <h1>Is it a Date? ❤️</h1>

    <p>I have a feeling you already know the correct answer 🌸</p>

    <div class="buttons">

        <button id="yesBtn">Yes 💖</button>

        <button id="noBtn">No 🙈</button>

    </div>

    <div id="result">
        Yayyyyy!! 🌸💕✨
I knew you are smart woman🥹 and would make a smart choice♥️
    </div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");

let scale = 1;

let x = 220;
let y = 90;

/*
Only move nearby:
up, down, left, right
Never to screen corners
*/

function moveNo(){

    const distance = 90;

    const directions = [
        [distance,0],
        [-distance,0],
        [0,distance],
        [0,-distance]
    ];

    const move =
        directions[
            Math.floor(Math.random()*directions.length)
        ];

    x += move[0];
    y += move[1];

    const box = document.querySelector(".buttons");

    const maxX =
        box.clientWidth -
        noBtn.offsetWidth;

    const maxY =
        box.clientHeight -
        noBtn.offsetHeight;

    x = Math.max(0,Math.min(x,maxX));
    y = Math.max(0,Math.min(y,maxY));

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.18;

    yesBtn.style.transform =
        `scale(${scale})`;
}

noBtn.addEventListener("mouseenter",moveNo);

noBtn.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    moveNo();
});

yesBtn.addEventListener("click",()=>{

    document.querySelector(".buttons").style.display="none";

    result.style.display="block";

});

</script>

</body>
</html>
